server {
    listen 5001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro static output resolves routes as directories with index.html files.
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:css|js|mjs|svg|ico|woff2?|ttf|eot|jpg|jpeg|png|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
